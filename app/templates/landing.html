{% extends 'index.html' %}
{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="col-11 col-sm-8 col-md-6 col-lg-4">
    
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-4">

        <h4 class="text-center fw-bold mb-4">Placement Portal</h4>

       
        <div class="mb-4">
          <p class="text-muted text-center mb-3">Don't have an account?</p>
          <div class="d-grid gap-2">
            <a href="{{ url_for('company.register_company') }}" 
               class="btn btn-outline-primary">
              Register as Company
            </a>
            <a href="{{ url_for('student.register_student') }}" 
               class="btn btn-outline-success">
              Register as Student
            </a>
          </div>
        </div>

        <hr>

      
        <div>
          <p class="text-muted text-center mb-3">Login As</p>
          <div class="d-grid gap-2">
            <a href="{{ url_for('admin.admin_login') }}" 
               class="btn btn-dark">
              Admin
            </a>
            <a href="{{ url_for('company.login_company') }}" 
               class="btn btn-primary">
              Company
            </a>
            <a href="{{ url_for('student.student_login') }}" 
               class="btn btn-success">
              Student
            </a>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>


{% endblock %}
